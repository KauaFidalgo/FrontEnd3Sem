<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Formulários</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body onload="buscarIMCs()">
    <h1>Cadastro IMC >></h1>
    <form>
        <fieldset>
            <legend>Cadastro</legend>

            <input type="text" value="" id="nome" placeholder="Nome">
            <input type="number" value="" id="altura" placeholder="Altura em Metros ex 1.67">
            <input type="number" value="" id="peso" placeholder="Peso em Quilos">
            <button 
                type="button" 
                onclick="calcular()">
                Calcular</button>
            <button type="reset">Limpar</button>
        </fieldset>
    </form>
    <section>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Altura</th>
                    <th>Peso</th>
                    <th>Imc</th>
                    <th>Situação</th>
                </tr>
            </thead>

            <tbody id="cadastro"></tbody>
        </table>
    </section>

    <script>
        function calcular() {
            //entrada de dados
            const nome = document.getElementById("nome").value;
            const altura = parseFloat(document.getElementById("altura").value);
            const peso = parseFloat(document.getElementById("peso").value);
            const imc = calcularIMC(altura, peso);
            const textoIMC = gerarTextoIMC(imc);
            const cadastro = document.getElementById("cadastro");

            //validacao se preencheu todos os campos
            if(nome.trim().length == 0 || isNaN(altura) || isNaN(peso)) {
                alert("Preencha todos os campos corretamente.");
                return;
            }       
 
            //cadastra um item de cadastro no final da lista    
            //mantendo os itens anteriores
            cadastro.innerHTML += 
            `<tr>
                <td>${nome}</td>
                <td>${altura}</td>
                <td>${peso}</td>
                <td>${imc}</td>
                <td>${textoIMC}</td>
            </tr>`;

        }
    </script>

    <script src="./js/script.js"></script>
</body>

</html>
